---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: samba
  namespace: infra
spec:
  selector:
    matchLabels:
      app: samba
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: samba
    spec:
      nodeName: nas
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      volumes:
        - name: config
          configMap:
            name: samba-config
        - name: host-storage
          hostPath:
            path: /mnt/data/media
        - name: samba-log
          emptyDir: {}
      containers:
        - name: samba
          image: alpine:latest
          imagePullPolicy: Always
          env:
            - name: SMB_USER
              valueFrom:
                secretKeyRef: { name: smb-auth, key: SMB_USER }
            - name: SMB_UID
              valueFrom:
                secretKeyRef: { name: smb-auth, key: SMB_UID }
            - name: SMB_GROUP
              valueFrom:
                secretKeyRef: { name: smb-auth, key: SMB_GROUP }
            - name: SMB_GID
              valueFrom:
                secretKeyRef: { name: smb-auth, key: SMB_GID }
            - name: SMB_PASS
              valueFrom:
                secretKeyRef: { name: smb-auth, key: SMB_PASS }
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache samba shadow su-exec

              groupadd -g ${SMB_GID} ${SMB_GROUP}
              useradd -u ${SMB_UID} -g ${SMB_GROUP} -s /sbin/nologin -M ${SMB_USER}

              rm -rf /etc/samba/*
              sed "s/__SMB_GROUP__/${SMB_GROUP}/g" /run/samba/smb.conf.template > /etc/samba/smb.conf
              echo -e "${SMB_PASS}\n${SMB_PASS}" | smbpasswd -a -s ${SMB_USER}

              exec /usr/sbin/smbd -F --no-process-group </dev/null
          volumeMounts:
            - name: config
              mountPath: /run/samba/smb.conf.template
              subPath: smb.conf.template
            - name: host-storage
              mountPath: /mnt/data/media
            - name: samba-log
              mountPath: /var/log/samba
          ports:
            - containerPort: 445
              hostPort: 445
              name: smb-port
        - name: avahi
          image: alpine:latest
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache avahi tcpdump iptables
              rm -rf /etc/avahi/services/*
              cp /run/smb.service /etc/avahi/services/
              cp /run/avahi-daemon.conf /etc/avahi/avahi-daemon.conf

              REAL_NIC=$(ip route show | grep default | awk '{print $5}')
              echo "The real physical NIC is: ${REAL_NIC}"
              if [ ! -z "${REAL_NIC}" ]; then
                sed -i "/\[server\]/a allow-interfaces=${REAL_NIC}" /etc/avahi/avahi-daemon.conf
              fi

              iptables -t mangle -A POSTROUTING -p udp --dport 5353 -d 224.0.0.251 -j CHECKSUM --checksum-fill

              exec /usr/sbin/avahi-daemon
          volumeMounts:
            - name: config
              mountPath: /run/avahi-daemon.conf
              subPath: avahi-daemon.conf
            - name: config
              mountPath: /run/smb.service
              subPath: avahi.smb.service
          ports:
            - containerPort: 5353
              hostPort: 5353
              protocol: UDP
              name: mdns-port
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: samba-config
  namespace: infra
data:
  smb.conf.template: |
    [global]
      min protocol = SMB2
      workgroup = WORKGROUP
      server string = nas samba server
      server role = standalone server
      logging = stdout
      log level = 1
      max log size = 0
      guest account = nobody
      
      aio read size = 16384
      aio write size = 16384
      use sendfile = yes

      vfs objects = catia fruit streams_xattr
      fruit:aapl = yes
      fruit:metadata = stream
      fruit:model = Macmini
      fruit:posix_metadata = yes

    [media]
      comment = My Media
      path = /mnt/data/media
      writeable = yes
      browseable = yes
      guest ok = no
      public = no
      create mask = 0644
      directory mask = 0755
      valid users = @__SMB_GROUP__
  avahi-daemon.conf: |
    [server]
    host-name=nas
    domain-name=local
    enable-dbus=no
    use-ipv4=yes
    use-ipv6=no
    ratelimit-interval-usec=1000000
    ratelimit-burst=1000

    [wide-area]
    enable-wide-area=yes

    [publish]
    publish-addresses=yes
    publish-hinfo=no
    publish-workstation=no
    publish-domain=no
  avahi.smb.service: |
    <?xml version="1.0" standalone='no'?>
    <!DOCTYPE service-group SYSTEM "avahi-service.dtd">
    <service-group>
      <name replace-wildcards="yes">%h</name>
      <service>
        <type>_smb._tcp</type>
        <port>445</port>
      </service>
      <service>
        <type>_device-info._tcp</type>
        <port>0</port>
        <txt-record>model=Macmini</txt-record>
      </service>
    </service-group>
